<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Football Sim</title>

    <link rel="stylesheet" href="./styles/dashboard.css" />
    <link rel="stylesheet" href="./styles/scoreboard.css" />
    <link rel="stylesheet" href="./styles/draft.css" />
    <link rel="stylesheet" href="./styles/schedule.css" />
    <link rel="stylesheet" href="./styles/stats.css" />
    <link rel="stylesheet" href="./styles/training.css" />
    <script type="module" src="./src/app.ts"></script>
  </head>

  <body>
    <div id="global-top-bar">
      <div id="gtb-team-select"></div>
      <div id="gtb-snake-btn"></div>
      <div id="gtb-status"></div>
      <nav id="gtb-tabs" style="display:none">
        <button id="tab-play" class="tab-btn">Play</button>
        <button id="tab-schedule" class="tab-btn">Season</button>
        <button id="tab-stats" class="tab-btn">Stats</button>
        <button id="tab-training" class="tab-btn">Training</button>
      </nav>
    </div>

    <main id="root">
      <!-- Draft screen: shown on load, hidden once draft is complete -->
      <div id="draft-screen">
        <div class="draft-controls">
          <label for="draft-team-select">Drafting for:</label>
          <select id="draft-team-select"></select>
        </div>
        <div id="draft-main">
          <div id="draft-left-col">
            <div id="draft-rosters"></div>
          </div>
          <div id="draft-right-col">
            <div id="draft-best-prospects"></div>
            <div id="draft-pool"></div>
          </div>
        </div>
        <div id="draft-recap" style="display:none">
          <div id="draft-recap-rosters"></div>
        </div>
      </div>

<div id="schedule-tab" class="tab-panel" style="display:none">
        <div id="schedule-root"></div>
      </div>

      <div id="stats-tab" class="tab-panel" style="display:none">
        <div id="stats-root"></div>
      </div>

      <div id="training-tab" class="tab-panel" style="display:none">
        <div id="training-root"></div>
      </div>

      <div id="play-tab" class="tab-panel" style="display:none">
        <div class="controls-container">
          <div class="control-row">
            <div class="slider-group">
              <label for="sim-speed-slider"
                >Speed: <span id="speed-label">1×</span></label
              >
              <input
                type="range"
                id="sim-speed-slider"
                min="0"
                max="13"
                step="1"
                value="2"
              />
            </div>
          </div>

          <div class="control-row">
            <div class="slider-group">
              <label for="team-select-0">Team 1</label>
              <select id="team-select-0" class="team-select"></select>
            </div>
            <div class="slider-group">
              <label for="team-select-1">Team 2</label>
              <select id="team-select-1" class="team-select"></select>
            </div>
            <button id="btn-reset-game" class="reset-btn">Reset Game</button>
          </div>

          <div class="control-row playbook-row" id="playbook-controls">
            <div class="slider-group">
              <label for="pass-slider"
                >Pass Mix: <span id="pass-label">50%</span></label
              >
              <input
                type="range"
                id="pass-slider"
                min="0"
                max="1"
                step="0.5"
                value="0.5"
              />
            </div>

            <div class="slider-group">
              <label for="man-slider"
                >Man Coverage Mix: <span id="man-label">50%</span></label
              >
              <input
                type="range"
                id="man-slider"
                min="0"
                max="1"
                step="0.5"
                value="0.5"
              />
            </div>

            <div class="slider-group">
              <label for="blitz-slider"
                >Blitz Mix: <span id="blitz-label">50%</span></label
              >
              <input
                type="range"
                id="blitz-slider"
                min="0"
                max="1"
                step="0.5"
                value="0.5"
              />
            </div>
          </div>
        </div>

        <div
          id="replay-controls"
          style="margin: 10px 0; display: flex; gap: 5px; flex-wrap: wrap"
        >
          <button id="btn-replay-live" class="replay-btn active-mode">
            Live
          </button>
          <!-- "N Plays Ago" buttons are generated from NUM_REPLAYS in replayControls.ts -->
        </div>

        <div id="scoreboard" class="scoreboard">
          <!-- Two generic team slots filled by updateScoreboardUI from the game's teams -->
          <div class="team-container">
            <div class="team-column">
              <div id="team-0" class="team-box">
                <span id="dot-0" class="possession-dot">•</span>
                <span id="name-0" class="team-name"></span>
                <span id="score-0" class="score">0</span>
              </div>
              <div id="timeouts-0" class="timeouts">
                <span class="timeout-dash"></span>
                <span class="timeout-dash"></span>
                <span class="timeout-dash"></span>
              </div>
            </div>
            <div class="team-column">
              <div id="team-1" class="team-box">
                <span id="dot-1" class="possession-dot">•</span>
                <span id="name-1" class="team-name"></span>
                <span id="score-1" class="score">0</span>
              </div>
              <div id="timeouts-1" class="timeouts">
                <span class="timeout-dash"></span>
                <span class="timeout-dash"></span>
                <span class="timeout-dash"></span>
              </div>
            </div>
          </div>

          <div class="game-info">
            <div class="scoreboard-item">
              <span id="quarter" class="scoreboard-value"></span>
              <span id="game-clock"></span>
            </div>
            <div class="scoreboard-item">
              <span id="down-dist" class="scoreboard-value"></span>
            </div>
            <div class="scoreboard-item">
              <span id="yard-line" class="scoreboard-value"></span>
            </div>
          </div>
        </div>

        <div class="play-field-row">
          <div id="hl-panel" style="display:none"></div>
          <canvas id="field"></canvas>
        </div>

        <div id="player-dashboard"></div>
      </div>
    </main>

    <div id="global-bottom-bar">
      <div id="gbb-sort">
        <span class="gbb-label">Sort:</span>
        <button class="draft-sort-btn active" data-sort="pos">Pos</button>
        <button class="draft-sort-btn" data-sort="ovr">OVR</button>
        <button class="draft-sort-btn" data-sort="draft">Draft</button>
      </div>
      <button id="btn-ratings-toggle-draft" class="header-toggle-btn gbb-ratings-btn">Show Rankings</button>
    </div>
  </body>
</html>
