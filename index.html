<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Football Sim</title>

    <link rel="stylesheet" href="./styles/dashboard.css" />
    <link rel="stylesheet" href="./styles/scoreboard.css" />
    <script type="module" src="./src/app.ts"></script>
  </head>

  <body>
    <header>
      <h2>Football Sim</h2>
    </header>

    <main id="root">
      <div class="controls-container">
        <div class="control-row">
          <div class="slider-group">
            <label for="sim-speed-slider"
              >Speed: <span id="speed-label">1×</span></label
            >
            <input
              type="range"
              id="sim-speed-slider"
              min="0"
              max="13"
              step="1"
              value="2"
            />
          </div>
        </div>

        <div class="control-row playbook-row" id="playbook-controls">
          <div class="slider-group">
            <label for="pass-slider"
              >Pass Mix: <span id="pass-label">50%</span></label
            >
            <input
              type="range"
              id="pass-slider"
              min="0"
              max="1"
              step="0.5"
              value="0.5"
            />
          </div>

          <div class="slider-group">
            <label for="man-slider"
              >Man Coverage Mix: <span id="man-label">50%</span></label
            >
            <input
              type="range"
              id="man-slider"
              min="0"
              max="1"
              step="0.5"
              value="0.5"
            />
          </div>

          <div class="slider-group">
            <label for="blitz-slider"
              >Blitz Mix: <span id="blitz-label">50%</span></label
            >
            <input
              type="range"
              id="blitz-slider"
              min="0"
              max="1"
              step="0.5"
              value="0.5"
            />
          </div>
        </div>
      </div>

      <div id="replay-controls" style="margin: 10px 0; display: flex; gap: 5px">
        <button
          id="btn-replay-live"
          class="replay-btn active-mode"
          style="
            background: #22c55e;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
          "
        >
          Live
        </button>
        <button
          id="btn-replay-1"
          class="replay-btn"
          disabled
          style="padding: 6px 12px; cursor: pointer; border-radius: 4px"
        >
          1 Play Ago
        </button>
        <button
          id="btn-replay-2"
          class="replay-btn"
          disabled
          style="padding: 6px 12px; cursor: pointer; border-radius: 4px"
        >
          2 Plays Ago
        </button>
        <button
          id="btn-replay-3"
          class="replay-btn"
          disabled
          style="padding: 6px 12px; cursor: pointer; border-radius: 4px"
        >
          3 Plays Ago
        </button>
      </div>

      <div id="scoreboard" class="scoreboard">
        <div class="team-container">
          <div id="team-red" class="team-box">
            <span id="name-red" class="team-name">RED</span>
            <span id="score-red" class="score">0</span>
          </div>
          <div id="team-blue" class="team-box">
            <span id="name-blue" class="team-name">BLUE</span>
            <span id="score-blue" class="score">0</span>
          </div>
        </div>

        <div class="game-info">
          <div class="scoreboard-item">
            <span id="quarter" class="scoreboard-value"></span>
            <span id="game-clock"></span>
          </div>
          <div class="scoreboard-item">
            <span id="down-dist" class="scoreboard-value"></span>
          </div>
          <div class="scoreboard-item">
            <span id="yard-line" class="scoreboard-value"></span>
          </div>
        </div>
      </div>

      <canvas id="field"></canvas>

      <div id="player-dashboard"></div>
    </main>
  </body>
</html>
