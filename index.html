<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Football Sim</title>

    <link rel="stylesheet" href="./styles/scoreboard.css" />
    <script type="module" src="./src/app.ts"></script>
  </head>

  <body>
    <header>
      <h2>Football Sim</h2>
    </header>

    <main id="root">
      <div id="scoreboard" class="scoreboard">
        <div class="team-container">
          <div id="team-red" class="team-box">
            <span class="possession-dot" id="pos-red">•</span>
            <span class="team-name">RED</span>
            <span id="score-red" class="score">0</span>
          </div>
          <div id="team-blue" class="team-box">
            <span class="possession-dot" id="pos-blue">•</span>
            <span class="team-name">BLUE</span>
            <span id="score-blue" class="score">0</span>
          </div>
        </div>

        <div class="game-info">
          <div class="scoreboard-item">
            <span id="down-dist" class="scoreboard-value">1st & 10</span>
          </div>
          <div class="scoreboard-item">
            <span id="yard-line" class="scoreboard-value">OWN 25</span>
          </div>
          <div class="scoreboard-item">
            <span id="game-clock" class="scoreboard-value">15:00</span>
            <span id="quarter" class="quarter-value">1st</span>
          </div>
        </div>
      </div>

      <canvas id="field"></canvas>
    </main>
  </body>
</html>
